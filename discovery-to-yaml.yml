---
- name: Discover current macOS configuration and generate YAML config
  hosts: all
  gather_facts: true

  vars:
    # Base formulae from group_vars/all.yml for comparison
    base_formulae:
      - ffmpeg
      - fzf
      - gh
      - git
      - nvm
      - openssl@3
      - pgvector
      - pipx
      - pyenv
      - python@3.14
      - rbenv
      - ruby-build
      - rustup
      - sqlite
      - uv
      - whisper-cpp

    base_casks:
      - ngrok

  tasks:
    - name: Create discovery output directory
      ansible.builtin.file:
        path: "{{ playbook_dir }}/discovery_output"
        state: directory
        mode: '0755'
      delegate_to: localhost
      run_once: true

    - name: Gather Homebrew formulae
      ansible.builtin.shell: brew list --formula
      register: brew_formulae
      changed_when: false
      failed_when: false

    - name: Gather Homebrew casks
      ansible.builtin.shell: brew list --cask
      register: brew_casks
      changed_when: false
      failed_when: false

    - name: Gather Homebrew taps
      ansible.builtin.shell: brew tap
      register: brew_taps
      changed_when: false
      failed_when: false

    - name: Check Ruby version (rbenv)
      ansible.builtin.shell: |
        if command -v rbenv >/dev/null 2>&1; then
          rbenv version | awk '{print $1}'
        else
          echo "not_installed"
        fi
      register: ruby_current
      changed_when: false
      failed_when: false

    - name: List installed Ruby versions (rbenv)
      ansible.builtin.shell: |
        if command -v rbenv >/dev/null 2>&1; then
          rbenv versions --bare
        else
          echo ""
        fi
      register: ruby_versions
      changed_when: false
      failed_when: false

    - name: Check Node.js version (nvm)
      ansible.builtin.shell: |
        export NVM_DIR="$HOME/.nvm"
        [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
        if command -v nvm >/dev/null 2>&1; then
          nvm current | sed 's/^v//'
        else
          echo "not_installed"
        fi
      args:
        executable: /bin/zsh
      register: node_current
      changed_when: false
      failed_when: false

    - name: List installed Node.js versions (nvm)
      ansible.builtin.shell: |
        export NVM_DIR="$HOME/.nvm"
        [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
        if command -v nvm >/dev/null 2>&1; then
          nvm list | grep -E '^\s*v[0-9]' | sed 's/^.*v\([0-9.]*\).*/\1/' | grep -v 'system'
        else
          echo ""
        fi
      args:
        executable: /bin/zsh
      register: node_versions
      changed_when: false
      failed_when: false

    - name: Check Python version (pyenv)
      ansible.builtin.shell: |
        if command -v pyenv >/dev/null 2>&1; then
          pyenv version | awk '{print $1}'
        else
          echo "not_installed"
        fi
      register: python_current
      changed_when: false
      failed_when: false

    - name: List installed Python versions (pyenv)
      ansible.builtin.shell: |
        if command -v pyenv >/dev/null 2>&1; then
          pyenv versions --bare | grep -v 'system'
        else
          echo ""
        fi
      register: python_versions
      changed_when: false
      failed_when: false

    - name: Check Rust toolchain (rustup)
      ansible.builtin.shell: |
        if command -v rustup >/dev/null 2>&1; then
          rustup show active-toolchain | awk '{print $1}'
        else
          echo "not_installed"
        fi
      register: rust_toolchain
      changed_when: false
      failed_when: false

    - name: Calculate extra formulae (not in base config)
      ansible.builtin.set_fact:
        extra_formulae: "{{ brew_formulae.stdout_lines | difference(base_formulae) | sort }}"

    - name: Calculate extra casks (not in base config)
      ansible.builtin.set_fact:
        extra_casks: "{{ brew_casks.stdout_lines | difference(base_casks) | sort }}"

    - name: Generate YAML configuration file
      ansible.builtin.copy:
        content: |
          ---
          # =============================================================================
          # {{ inventory_hostname }} - Discovered Configuration
          # Generated: {{ ansible_date_time.iso8601 }}
          # =============================================================================
          # This file was auto-generated by discovery-to-yaml.yml
          # Review and adjust before using in production

          # -----------------------------------------------------------------------------
          # Homebrew formulae
          # -----------------------------------------------------------------------------
          # Total formulae installed: {{ brew_formulae.stdout_lines | length }}
          # Base formulae (in group_vars/all.yml): {{ base_formulae | length }}
          # Extra formulae (machine-specific): {{ extra_formulae | length }}

          homebrew_formulae_extra:
          {% for formula in extra_formulae %}
            - {{ formula }}
          {% endfor %}

          # -----------------------------------------------------------------------------
          # Homebrew casks
          # -----------------------------------------------------------------------------
          # Total casks installed: {{ brew_casks.stdout_lines | length }}
          # Base casks (in group_vars/all.yml): {{ base_casks | length }}
          # Extra casks (machine-specific): {{ extra_casks | length }}

          homebrew_casks_extra:
          {% for cask in extra_casks %}
            - {{ cask }}
          {% endfor %}

          # -----------------------------------------------------------------------------
          # Homebrew taps
          # -----------------------------------------------------------------------------
          {% if brew_taps.stdout_lines | length > 0 %}
          homebrew_taps_extra:
          {% for tap in brew_taps.stdout_lines %}
            - {{ tap }}
          {% endfor %}
          {% else %}
          # homebrew_taps_extra: []
          {% endif %}

          # -----------------------------------------------------------------------------
          # Language versions
          # -----------------------------------------------------------------------------

          {% if ruby_current.stdout != "not_installed" %}
          # Ruby (rbenv)
          rbenv_ruby_global: "{{ ruby_current.stdout }}"
          {% if ruby_versions.stdout_lines | length > 0 %}
          rbenv_ruby_versions:
          {% for version in ruby_versions.stdout_lines %}
            - "{{ version }}"
          {% endfor %}
          {% endif %}
          {% endif %}

          {% if node_current.stdout != "not_installed" %}
          # Node.js (nvm)
          nvm_node_global: "{{ node_current.stdout }}"
          {% if node_versions.stdout_lines | length > 0 %}
          nvm_node_versions:
          {% for version in node_versions.stdout_lines %}
            - "{{ version }}"
          {% endfor %}
          {% endif %}
          {% endif %}

          {% if python_current.stdout != "not_installed" %}
          # Python (pyenv)
          pyenv_python_global: "{{ python_current.stdout }}"
          {% if python_versions.stdout_lines | length > 0 %}
          pyenv_python_versions:
          {% for version in python_versions.stdout_lines %}
            - "{{ version }}"
          {% endfor %}
          {% endif %}
          {% endif %}

          {% if rust_toolchain.stdout != "not_installed" %}
          # Rust (rustup)
          rust_toolchain: {{ rust_toolchain.stdout }}
          {% endif %}

          # -----------------------------------------------------------------------------
          # Git repositories
          # -----------------------------------------------------------------------------
          # Add discovered repos here manually if needed
          # git_repos_extra: []

        dest: "{{ playbook_dir }}/discovery_output/{{ inventory_hostname }}_discovered.yml"
        mode: '0644'
      delegate_to: localhost

    - name: Generate comparison summary
      ansible.builtin.copy:
        content: |
          # Configuration Comparison: {{ inventory_hostname }}
          Generated: {{ ansible_date_time.iso8601 }}

          ## Summary
          - **Total formulae installed**: {{ brew_formulae.stdout_lines | length }}
          - **Base formulae** (shared): {{ base_formulae | length }}
          - **Extra formulae** (machine-specific): {{ extra_formulae | length }}

          - **Total casks installed**: {{ brew_casks.stdout_lines | length }}
          - **Base casks** (shared): {{ base_casks | length }}
          - **Extra casks** (machine-specific): {{ extra_casks | length }}

          ## Language Versions

          ### Current Config (group_vars/all.yml)
          - Ruby: 3.4.4
          - Node.js: 24.13.0, 22.14.0
          - Python: 3.14.3

          ### Discovered ({{ inventory_hostname }})
          {% if ruby_current.stdout != "not_installed" %}
          - Ruby: {{ ruby_current.stdout }}
          {% endif %}
          {% if node_current.stdout != "not_installed" %}
          - Node.js: {{ node_current.stdout }}
          {% endif %}
          {% if python_current.stdout != "not_installed" %}
          - Python: {{ python_current.stdout }}
          {% endif %}

          ## Extra Formulae ({{ extra_formulae | length }})
          {% for formula in extra_formulae %}
          - {{ formula }}
          {% endfor %}

          ## Files Generated
          - YAML config: `discovery_output/{{ inventory_hostname }}_discovered.yml`
          - Comparison: `discovery_output/{{ inventory_hostname }}_comparison.md`

          ## Next Steps
          1. Review `{{ inventory_hostname }}_discovered.yml`
          2. Decide which extras to keep vs. remove
          3. Update `inventory/host_vars/{{ inventory_hostname }}.yml` with desired config
          4. Run provisioning to apply changes

        dest: "{{ playbook_dir }}/discovery_output/{{ inventory_hostname }}_comparison.md"
        mode: '0644'
      delegate_to: localhost

    - name: Discovery complete
      ansible.builtin.debug:
        msg: |
          Discovery complete! Files generated:
          - YAML config: discovery_output/{{ inventory_hostname }}_discovered.yml
          - Comparison: discovery_output/{{ inventory_hostname }}_comparison.md
