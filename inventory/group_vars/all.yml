---
# =============================================================================
# Shared configuration for all macOS workstations
# =============================================================================
# Per-machine overrides go in host_vars/<hostname>.yml
# Roles merge base lists with *_extra lists, so host_vars can add items
# without overriding these defaults.

# -----------------------------------------------------------------------------
# Homebrew path (Apple Silicon: /opt/homebrew/bin, Intel: /usr/local/bin)
# Required for remote SSH connections which don't load shell profiles
# -----------------------------------------------------------------------------
homebrew_path: /opt/homebrew/bin

# -----------------------------------------------------------------------------
# Upgrade mode
# -----------------------------------------------------------------------------
# Default: false (install missing packages only)
# Set to true to upgrade all packages to latest versions:
#   ansible-playbook site.yml --limit mac-mini-m2 -e upgrade_packages=true
upgrade_packages: false
install_dam_wrapper: false   # Only David's machines have ~/dev/ad/appydave-tools source checkout.
                             # David sets this true in group_vars/david.yml.
ansible_user: "{{ lookup('env', 'USER') }}"  # Defaults to whoever runs the playbook — override in host_vars for named users
propagate_ssh_key: false     # Copies ~/.ssh/id_ed25519 from control node to remote machines. David sets true in david.yml.

# -----------------------------------------------------------------------------
# Homebrew taps
# -----------------------------------------------------------------------------
homebrew_taps: []
homebrew_taps_extra: []

# -----------------------------------------------------------------------------
# Homebrew formulae (explicitly installed packages)
# -----------------------------------------------------------------------------
homebrew_formulae:
  # Core utilities — every machine
  - ffmpeg
  - fzf
  - jq                     # JSON processor — used by app launcher, aliases, and agent tooling
  - overmind               # Process manager for Procfile-based apps (tmux-backed)
  - rsync                  # Modern rsync v3.x (macOS ships with ancient v2.6.9 from 2006)
  - gh
  - git
  - openssl@3
  - sqlite
  - uv
  - dockutil               # Manage macOS Dock items via CLI (used by dock role)

  # Language version managers — every machine
  - tmux                   # Terminal multiplexer — every machine
  - nvm
  - pipx
  - pyenv
  - python@3.14
  - rbenv
  - ruby-build
  # rustup — David-specific (group_vars/david.yml). Add to homebrew_formulae_extra if you need Rust.

  # Services — every machine
  # postgresql@17 — David-specific (group_vars/david.yml). Supabase CLI bundles its own Postgres via Docker.
  - supabase               # Supabase CLI — local Supabase stack (includes bundled Postgres via Docker)

homebrew_formulae_extra: []

# -----------------------------------------------------------------------------
# Homebrew casks (GUI applications)
# -----------------------------------------------------------------------------
# These are installed on ALL machines (including remote desktop machines)
# Machine-specific extras (e.g. video production) go in host_vars/*_extra
homebrew_casks:
  # Universal — every machine regardless of role
  - 1password              # Password manager
  - 1password-cli          # 1Password CLI for secret injection
  - claude                 # Claude desktop app — AI co-working tool (infrastructure, not a GUI app)

  # Manual install — use Mac App Store (brew cask pkg installer is unreliable):
  # App Store: https://apps.apple.com/app/tailscale/id1475387142
  # After install: open Tailscale → log in → run: tailscale ip → update inventory/hosts.yml

homebrew_casks_extra: []

# -----------------------------------------------------------------------------
# Shell configuration
# -----------------------------------------------------------------------------
zsh_theme: robbyrussell
zsh_plugins:
  - git
  - zsh-autosuggestions
  - zsh-syntax-highlighting

shell_extra_paths:
  - /opt/homebrew/bin
  - /opt/homebrew/sbin
  - $HOME/.rbenv/bin
  - $HOME/.pyenv/bin
  - $HOME/.local/bin

shell_env_vars:
  EDITOR: vim
  LANG: en_US.UTF-8
  HOMEBREW_NO_ANALYTICS: "1"

# -----------------------------------------------------------------------------
# macOS defaults (Finder, Dock, system preferences)
# -----------------------------------------------------------------------------
macos_defaults:
  # Finder: show all file extensions
  - domain: NSGlobalDomain
    key: AppleShowAllExtensions
    type: bool
    value: true

  # Finder: show hidden files
  - domain: com.apple.finder
    key: AppleShowAllFiles
    type: bool
    value: true

  # Finder: show path bar
  - domain: com.apple.finder
    key: ShowPathbar
    type: bool
    value: true

  # Finder: show status bar
  - domain: com.apple.finder
    key: ShowStatusBar
    type: bool
    value: true

  # Finder: default to list view
  - domain: com.apple.finder
    key: FXPreferredViewStyle
    type: string
    value: Nlsv

  # Finder: search current folder by default
  - domain: com.apple.finder
    key: FXDefaultSearchScope
    type: string
    value: SCcf

  # Dock: set icon size
  - domain: com.apple.dock
    key: tilesize
    type: float
    value: 48

  # Dock: auto-hide
  - domain: com.apple.dock
    key: autohide
    type: bool
    value: true

  # Dock: minimize using scale effect
  - domain: com.apple.dock
    key: mineffect
    type: string
    value: scale

  # Desktop & Dock: click wallpaper to reveal desktop → Only in Stage Manager
  # System Settings path: Desktop & Dock → "Click wallpaper to reveal desktop"
  # false = Only in Stage Manager (default click does nothing in normal mode)
  # true  = Always (clicking wallpaper hides all windows)
  - domain: com.apple.WindowManager
    key: EnableStandardClickToShowDesktop
    type: bool
    value: false

  # Disable natural scrolling
  - domain: NSGlobalDomain
    key: com.apple.swipescrolldirection
    type: bool
    value: false

  # Enable key repeat (disable press-and-hold)
  - domain: NSGlobalDomain
    key: ApplePressAndHoldEnabled
    type: bool
    value: false

  # Fast key repeat rate
  - domain: NSGlobalDomain
    key: KeyRepeat
    type: float
    value: 2

  # Short delay before key repeat
  - domain: NSGlobalDomain
    key: InitialKeyRepeat
    type: float
    value: 15

  # Dark mode
  - domain: NSGlobalDomain
    key: AppleInterfaceStyle
    type: string
    value: Dark

  # Locale — set per group (david.yml → en_AU, philippines.yml → en_PH)

  # Fn keys act as standard function keys (not media keys)
  - domain: NSGlobalDomain
    key: com.apple.keyboard.fnState
    type: bool
    value: true

  # Disable swipe to navigate (back/forward in browsers etc.)
  - domain: NSGlobalDomain
    key: AppleEnableSwipeNavigateWithScrolls
    type: bool
    value: false

  # Restore windows when re-opening an app
  - domain: NSGlobalDomain
    key: NSQuitAlwaysKeepsWindows
    type: bool
    value: true

  # Disable force click on trackpad
  - domain: NSGlobalDomain
    key: com.apple.trackpad.forceClick
    type: bool
    value: false

  # Finder: show internal hard drives on desktop
  - domain: com.apple.finder
    key: ShowHardDrivesOnDesktop
    type: bool
    value: true

  # Stage Manager: hide desktop icons when Stage Manager is active
  - domain: com.apple.WindowManager
    key: HideDesktop
    type: bool
    value: true

  # Tiling: no margins between tiled windows
  - domain: com.apple.WindowManager
    key: EnableTiledWindowMargins
    type: bool
    value: false

  # Tiling: disable edge-drag to tile windows
  - domain: com.apple.WindowManager
    key: EnableTilingByEdgeDrag
    type: bool
    value: false

  # Tiling: disable top-edge drag to tile windows
  - domain: com.apple.WindowManager
    key: EnableTopTilingByEdgeDrag
    type: bool
    value: false

  # iTerm: restore windows/tabs/panes after reboot via macOS window restoration
  # false = honour macOS's built-in restore (default behaviour)
  # true  = ignore it — iTerm starts fresh every launch (blocks reboot restoration)
  - domain: com.googlecode.iterm2
    key: NoSyncIgnoreSystemWindowRestoration
    type: bool
    value: false

macos_defaults_extra: []

# -----------------------------------------------------------------------------
# Shell template feature flags
# -----------------------------------------------------------------------------
# Controls whether .zshrc includes PostgreSQL libpq PATH + compiler flags.
# Set to true in group_vars/david.yml (or host_vars) when postgresql@17 is installed.
enable_postgresql_paths: false

# -----------------------------------------------------------------------------
# Language version managers
# -----------------------------------------------------------------------------
# Ruby (rbenv)
rbenv_ruby_versions:
  - "3.4.4"
rbenv_ruby_global: "3.4.4"
rbenv_gems:
  - bundler

# Node.js (nvm)
nvm_node_versions:
  - "24.13.0"
  - "22.14.0"
nvm_node_global: "24.13.0"
nvm_global_packages:
  - yarn
  - "@anthropic-ai/claude-code"

# Python (pyenv)
pyenv_python_versions:
  - "3.13.3"
pyenv_python_global: "3.13.3"
pyenv_global_packages: []

# Rust (rustup — David-specific, see group_vars/david.yml)
# Empty string disables Rust installation entirely (the languages/rust.yml task checks for non-empty)
rust_toolchain: ""
rust_components: []

# -----------------------------------------------------------------------------
# Git settings
# -----------------------------------------------------------------------------
# Git identity — REQUIRED per machine or group.
# Set in group_vars/david.yml (David's machines) or host_vars/<hostname>.yml (clients/team).
# Tasks in repos role already guard on: when: git_user_name | length > 0
git_user_name: ""
git_user_email: ""

# -----------------------------------------------------------------------------
# Git repositories to clone/update
# -----------------------------------------------------------------------------
git_repos: []
  # Example:
  # Example (replace with your own repos):
  # - repo: git@github.com:your-org/your-repo.git
  #   dest: "{{ ansible_env.HOME }}/dev/your-repo"

git_repos_extra: []
