---
# =============================================================================
# Workstation group — machines with a display, keyboard, and mouse
# Applies to: macbook-pro-m4, mac-mini-m4, mac-mini-jan, mac-mini-mary
# =============================================================================

homebrew_formulae_workstation:
  - ripgrep                # Fast grep (Claude Code's Grep tool uses this)
  # yt-dlp, gitleaks, whisper-cpp — David-specific, moved to group_vars/david.yml

homebrew_casks_workstation:
  # === BROWSERS & COMMUNICATION ===
  - google-chrome
  # - zoom             # Manual install — pkg installer requires sudo, fails non-interactively
  # - microsoft-teams  # Manual install — pkg installer requires sudo, fails non-interactively
  - whatsapp

  # === DEVELOPMENT ===
  - visual-studio-code
  - antigravity            # Google AI Coding Agent IDE (VS Code fork)
  - iterm2                 # Terminal — see david.yml for Ghostty (David's preference)

  # === PRODUCTIVITY ===
  - obsidian               # Note-taking (markdown)
  - hammerspoon            # macOS automation
  # ghostty  — David-specific terminal (group_vars/david.yml) — ADR-0003
  # alfred   — David-specific launcher (group_vars/david.yml) — requires license
  # rectangle — David-specific window manager (group_vars/david.yml)

  # === UTILITIES ===
  - loom                   # Screen recording
  - ollama                 # Local LLMs
  # - ngrok               # Removed — antivirus (McAfee) blocks unpack; install manually if needed

  # Manual installs (pkg installers requiring sudo or system extensions — brew cask unreliable):
  # zoom              → https://zoom.us/download
  # microsoft-teams   → https://www.microsoft.com/en/microsoft-teams/download-app
  # Docker            → https://www.docker.com/products/docker-desktop/
  # logi-options-plus → no Homebrew cask available → logitech.com/software/logi-options-plus.html
