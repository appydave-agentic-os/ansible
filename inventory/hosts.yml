---
# Agentic OS - Three Mac workstation cluster
# Control machine: MacBook Pro M4 Pro (where Claude Code runs)
# Target machines: M2 Mini (headless), M4 Mini (second workstation)
all:
  children:
    workstations:
      children:
        local:
          hosts:
            macbook-pro-m4:
              ansible_connection: local
              ansible_python_interpreter: "{{ ansible_playbook_python }}"
        remote:
          hosts:
            mac-mini-m2:
              ansible_host: Mac-mini-m2.local  # Update with actual hostname or IP
              ansible_user: davidcruwys
            mac-mini-m4:
              ansible_host: Mac-mini-m4.local  # Update with actual hostname or IP
              ansible_user: davidcruwys
