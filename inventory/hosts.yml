---
# =============================================================================
# Agentic OS — Five machine network (Thailand + Philippines)
# =============================================================================
#
# Connection topology (ansible_host / ansible_user defined here):
#   local   — MacBook Pro M4 (Ansible control node, runs locally)
#   remote  — machines accessed via SSH (used by tailscale role for SSH/VNC/SMB)
#
# Functional groups (inherit group_vars, composable):
#   workstation — has display/keyboard, gets GUI productivity apps
#   headless    — no display, minimal apps only
#   creator     — video production machine, gets Ecamm/Stream Deck etc.
#   agent       — automation node, gets bot/automation tooling
#
# Geographic groups:
#   thailand    — David's machines (local network + Tailscale)
#   philippines — Jan & Mary (Tailscale only, no .local routing)
# =============================================================================

all:
  children:

    # -------------------------------------------------------------------------
    # Connection topology
    # -------------------------------------------------------------------------
    local:
      hosts:
        macbook-pro-m4:
          ansible_connection: local
          ansible_python_interpreter: "{{ ansible_playbook_python }}"

    remote:
      hosts:
        mac-mini-m2:
          ansible_host: mac-mini-m2.local
        mac-mini-m4:
          ansible_host: mac-mini-m4.local
        # mac-mini-jan:                           # PENDING — machine not yet purchased
        #   ansible_host: mac-mini-jan            # Tailscale hostname (no .local — Philippines)
        # mac-mini-mary:                          # PENDING — machine not yet purchased
        #   ansible_host: mac-mini-mary           # Tailscale hostname (no .local — Philippines)
        # mac-mini-client-template:               # TEMPLATE — rename for each client
        #   ansible_host: mac-mini-client-template  # Replace with actual hostname or Tailscale name

    # -------------------------------------------------------------------------
    # Functional groups
    # -------------------------------------------------------------------------
    workstation:
      hosts:
        macbook-pro-m4:
        mac-mini-m4:
        # mac-mini-jan:               # PENDING — machine not yet purchased
        # mac-mini-mary:              # PENDING — machine not yet purchased
        # mac-mini-client-template:   # Uncomment when adding a client machine

    headless:
      hosts:
        mac-mini-m2:

    creator:
      hosts:
        macbook-pro-m4:
        mac-mini-m4:

    agent:
      hosts:
        mac-mini-m2:
        # mac-mini-jan:               # PENDING — machine not yet purchased
        # mac-mini-mary:              # PENDING — machine not yet purchased

    # -------------------------------------------------------------------------
    # Operator groups — machines belonging to a specific operator/person
    # -------------------------------------------------------------------------
    david:
      hosts:
        macbook-pro-m4:
        mac-mini-m4:
        mac-mini-m2:

    # client:             # Uncomment and add machines when provisioning client machines
    #   hosts:
    #     mac-mini-client-template:

    # -------------------------------------------------------------------------
    # Geographic groups
    # -------------------------------------------------------------------------
    thailand:
      hosts:
        macbook-pro-m4:
        mac-mini-m4:
        mac-mini-m2:

    # philippines:         # PENDING — machines not yet purchased
    #   hosts:
    #     mac-mini-jan:
    #     mac-mini-mary:
