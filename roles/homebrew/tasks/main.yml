---
- name: Update Homebrew index
  community.general.homebrew:
    update_homebrew: true
    path: "{{ homebrew_path }}"
  changed_when: false

- name: Add Homebrew taps
  community.general.homebrew_tap:
    name: "{{ item }}"
    state: present
    path: "{{ homebrew_path }}"
  loop: "{{ homebrew_taps + homebrew_taps_extra }}"
  when: (homebrew_taps + homebrew_taps_extra) | length > 0

- name: Build combined formulae list from all applicable groups
  ansible.builtin.set_fact:
    _all_formulae: >-
      {{ homebrew_formulae
         + (homebrew_formulae_workstation | default([]))
         + (homebrew_formulae_creator     | default([]))
         + (homebrew_formulae_agent       | default([]))
         + (homebrew_formulae_headless    | default([]))
         + homebrew_formulae_extra }}

- name: Install/upgrade Homebrew formulae
  community.general.homebrew:
    name: "{{ item }}"
    state: "{{ 'latest' if upgrade_packages | bool else 'present' }}"
    path: "{{ homebrew_path }}"
  loop: "{{ _all_formulae }}"
  when: _all_formulae | length > 0
