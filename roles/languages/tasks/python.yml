---
- name: "⏳ Python compile warning"
  ansible.builtin.debug:
    msg: "Installing Python {{ item }} via pyenv — compiles from source, takes 5-10 minutes. This is normal."
  loop: "{{ pyenv_python_versions }}"

- name: Install Python versions via pyenv
  ansible.builtin.shell: |
    export PATH="/opt/homebrew/bin:/opt/homebrew/sbin:$PATH"
    export PYENV_ROOT="$HOME/.pyenv"
    export PATH="$PYENV_ROOT/bin:$PATH"
    eval "$(pyenv init --path)"
    if ! pyenv versions --bare | grep -qx '{{ item }}'; then
      pyenv install {{ item }}
    fi
  args:
    executable: /bin/zsh
  register: python_install
  changed_when: "'Installed' in python_install.stderr or 'Installed' in python_install.stdout"
  loop: "{{ pyenv_python_versions }}"

- name: Set global Python version
  ansible.builtin.shell: |
    export PATH="/opt/homebrew/bin:/opt/homebrew/sbin:$PATH"
    export PYENV_ROOT="$HOME/.pyenv"
    export PATH="$PYENV_ROOT/bin:$PATH"
    eval "$(pyenv init --path)"
    pyenv global {{ pyenv_python_global }}
  args:
    executable: /bin/zsh
  changed_when: false
  when: pyenv_python_global | length > 0

- name: Install global Python packages
  ansible.builtin.shell: |
    export PATH="/opt/homebrew/bin:/opt/homebrew/sbin:$PATH"
    export PYENV_ROOT="$HOME/.pyenv"
    export PATH="$PYENV_ROOT/bin:$PATH"
    eval "$(pyenv init --path)"
    pip install {{ item }}
  args:
    executable: /bin/zsh
  register: pip_install
  changed_when: "'Successfully installed' in pip_install.stdout"
  loop: "{{ pyenv_global_packages }}"

- name: Update global Python packages
  ansible.builtin.shell: |
    export PATH="/opt/homebrew/bin:/opt/homebrew/sbin:$PATH"
    export PYENV_ROOT="$HOME/.pyenv"
    export PATH="$PYENV_ROOT/bin:$PATH"
    eval "$(pyenv init --path)"
    pip install --upgrade {{ item }}
  args:
    executable: /bin/zsh
  register: pip_upgrade
  changed_when: "'Successfully installed' in pip_upgrade.stdout"
  loop: "{{ pyenv_global_packages }}"
  when: upgrade_packages | bool
