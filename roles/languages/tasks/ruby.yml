---
- name: "⏳ Ruby compile warning"
  ansible.builtin.debug:
    msg: "Installing Ruby {{ item }} via rbenv — compiles from source, takes 2-3 minutes. This is normal."
  loop: "{{ rbenv_ruby_versions }}"

- name: Install Ruby versions via rbenv
  ansible.builtin.shell: |
    export PATH="/opt/homebrew/bin:/opt/homebrew/sbin:$PATH"
    eval "$(rbenv init -)"
    if ! rbenv versions --bare | grep -qx '{{ item }}'; then
      rbenv install {{ item }}
    fi
  args:
    executable: /bin/zsh
  register: ruby_install
  changed_when: "'Installed' in ruby_install.stderr or 'Installed' in ruby_install.stdout"
  loop: "{{ rbenv_ruby_versions }}"

- name: Set global Ruby version
  ansible.builtin.shell: |
    export PATH="/opt/homebrew/bin:/opt/homebrew/sbin:$PATH"
    eval "$(rbenv init -)"
    rbenv global {{ rbenv_ruby_global }}
  args:
    executable: /bin/zsh
  changed_when: false
  when: rbenv_ruby_global | length > 0

- name: Install global Ruby gems
  ansible.builtin.shell: |
    export PATH="/opt/homebrew/bin:/opt/homebrew/sbin:$PATH"
    eval "$(rbenv init -)"
    gem install {{ item }}
  args:
    executable: /bin/zsh
  register: gem_install
  changed_when: "'Successfully installed' in gem_install.stdout"
  loop: "{{ rbenv_gems }}"

- name: Update global Ruby gems
  ansible.builtin.shell: |
    export PATH="/opt/homebrew/bin:/opt/homebrew/sbin:$PATH"
    eval "$(rbenv init -)"
    gem update {{ item }}
  args:
    executable: /bin/zsh
  register: gem_update
  changed_when: "'Gems updated' in gem_update.stdout or 'Updating' in gem_update.stdout"
  loop: "{{ rbenv_gems }}"
  when: upgrade_packages | bool
