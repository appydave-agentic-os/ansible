---
- name: Check if Oh My Zsh is installed
  ansible.builtin.stat:
    path: "{{ ansible_facts['env']['HOME'] }}/.oh-my-zsh"
  register: ohmyzsh_dir

- name: Install Oh My Zsh
  ansible.builtin.shell: >
    sh -c "$(curl -fsSL https://raw.githubusercontent.com/ohmyzsh/ohmyzsh/master/tools/install.sh)"
    --unattended
  args:
    creates: "{{ ansible_facts['env']['HOME'] }}/.oh-my-zsh"
  when: not ohmyzsh_dir.stat.exists

- name: Clone zsh-autosuggestions plugin
  ansible.builtin.git:
    repo: https://github.com/zsh-users/zsh-autosuggestions.git
    dest: "{{ ansible_facts['env']['HOME'] }}/.oh-my-zsh/custom/plugins/zsh-autosuggestions"
    depth: 1
    update: true

- name: Clone zsh-syntax-highlighting plugin
  ansible.builtin.git:
    repo: https://github.com/zsh-users/zsh-syntax-highlighting.git
    dest: "{{ ansible_facts['env']['HOME'] }}/.oh-my-zsh/custom/plugins/zsh-syntax-highlighting"
    depth: 1
    update: true

- name: Deploy .zshrc from template
  ansible.builtin.template:
    src: zshrc.j2
    dest: "{{ ansible_facts['env']['HOME'] }}/.zshrc"
    backup: true
    mode: "0644"

- name: Deploy .zprofile from template
  ansible.builtin.template:
    src: zprofile.j2
    dest: "{{ ansible_facts['env']['HOME'] }}/.zprofile"
    backup: true
    mode: "0644"

- name: Deploy .zshenv from template
  ansible.builtin.template:
    src: zshenv.j2
    dest: "{{ ansible_facts['env']['HOME'] }}/.zshenv"
    backup: true
    mode: "0644"

- name: Create ~/.secrets placeholder
  ansible.builtin.file:
    path: "{{ ansible_facts['env']['HOME'] }}/.secrets"
    state: touch
    mode: "0600"
    modification_time: preserve
    access_time: preserve

- name: Create ~/.local/bin directory
  ansible.builtin.file:
    path: "{{ ansible_facts['env']['HOME'] }}/.local/bin"
    state: directory
    mode: "0755"

- name: Install dam wrapper script
  ansible.builtin.copy:
    dest: "{{ ansible_facts['env']['HOME'] }}/.local/bin/dam"
    mode: "0755"
    content: |
      #!/bin/bash
      # DAM CLI wrapper — runs appydave-tools from source via bundler
      # Allows FliHub and other tools to call `dam` without a global gem install
      export PATH="$HOME/.rbenv/shims:$HOME/.rbenv/bin:/opt/homebrew/bin:/opt/homebrew/sbin:$PATH"
      eval "$(rbenv init -)"
      cd "$HOME/dev/ad/appydave-tools" && bundle exec dam "$@"
