---
- name: Provision macOS development environment
  hosts: all

  environment:
    PATH: "/opt/homebrew/bin:/opt/homebrew/sbin:{{ ansible_env.PATH }}"

  pre_tasks:
    - name: Check if Homebrew is installed
      ansible.builtin.stat:
        path: /opt/homebrew/bin/brew
      register: brew_binary

    - name: Install Homebrew if missing
      ansible.builtin.shell: >
        /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
      environment:
        NONINTERACTIVE: "1"
      when: not brew_binary.stat.exists

  roles:
    - role: homebrew
      tags: [homebrew]

    - role: languages
      tags: [languages]

    - role: shell
      tags: [shell]

    - role: applications
      tags: [applications]

    - role: macos_defaults
      tags: [macos]

    - role: dock
      tags: [dock]

    - role: repos
      tags: [repos]

    - role: tailscale
      tags: [tailscale]
